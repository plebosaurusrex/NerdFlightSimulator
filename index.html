<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>NerdFlight v5.0.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}
#terminal{
  position:fixed;bottom:4px;right:8px;width:440px;z-index:30;
  font-family:'Share Tech Mono',monospace;font-size:12px;
  background:rgba(0,8,0,0.88);border:1px solid #33ff44;padding:6px 8px;
  display:none;
}
#term-output{color:#33ff44;min-height:120px;max-height:200px;overflow-y:auto;margin-bottom:4px;line-height:1.5;}
#term-output .dim{color:#1a6622;}
#term-output .bright{color:#aaffaa;}
#term-input-row{display:flex;align-items:center;gap:4px;}
#term-prompt{color:#aaffaa;}
#term-input{background:transparent;border:none;outline:none;color:#33ff44;font-family:'Share Tech Mono',monospace;font-size:12px;flex:1;caret-color:#33ff44;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="terminal">
  <div id="term-output"><span class="bright">NerdFlight v5.0.1 — TYPE ? FOR HELP</span></div>
  <div id="term-input-row">
    <span id="term-prompt">&gt;&nbsp;</span>
    <input id="term-input" type="text" autocomplete="off" spellcheck="false" autofocus />
  </div>
</div>

// ── STARS ──────────────────────────────────────────────────────────────────
function initStars(){
  stars=[];
  for(let i=0;i<300;i++) stars.push({x:Math.random()*W(),y:Math.random()*H(),z:Math.random()*W(),pz:W(),twinkle:Math.random()*Math.PI*2,speed:0.5+Math.random()*0.5});
}

function updateStars(){
  const spd=0.5+warpSpeed*9, cx=W()/2, cy=H()/2;
  stars.forEach(s=>{
    s.pz=s.z; s.z-=spd*s.speed; s.twinkle+=0.04;
    if(s.z<=0){s.x=Math.random()*W();s.y=Math.random()*H();s.z=W();s.pz=W();}
  });
}

function drawStars(){
  const cx=W()/2, cy=H()/2;
  stars.forEach(s=>{
    const sc=W()/s.z, sx=(s.x-cx)*sc+cx, sy=(s.y-cy)*sc+cy;
    if(sx<0||sx>W()||sy<0||sy>H()) return;
    const depth=1-s.z/W(), tw=0.7+0.3*Math.sin(s.twinkle), br=depth*tw;
    if(hyperdrive){
      const ps=W()/(s.pz*0.3), px=(s.x-cx)*ps+cx, py=(s.y-cy)*ps+cy;
      ctx.strokeStyle=br>0.6?BRIGHT:GREEN;ctx.lineWidth=br>0.6?1.5:0.8;ctx.globalAlpha=br*0.9;
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.stroke();ctx.globalAlpha=1;return;
    }
    let ch='.',col,sz;
    if(br>0.85){ch='O';col=BRIGHT;sz=14;}else if(br>0.65){ch='o';col=GREEN;sz=13;}
    else if(br>0.4){ch='+';col='#22aa33';sz=12;}else if(br>0.2){ch='*';col=DIM;sz=11;}
    else{ch='.';col='#0a3a10';sz=10;}
    if(warpSpeed>0.4){
      const ps=W()/s.pz, px=(s.x-cx)*ps+cx, py=(s.y-cy)*ps+cy;
      ctx.strokeStyle=col;ctx.lineWidth=0.8;ctx.globalAlpha=br*0.4;
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.fillStyle=col;ctx.font=FONT(sz);ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(ch,sx,sy);
  });
}

// ── COMETS ─────────────────────────────────────────────────────────────────
function spawnComet(){
  comets.push({x:80+Math.random()*(W()-160),y:-20,vx:(Math.random()-0.5)*1.2,vy:1.5+Math.random()*2.5,len:7+Math.floor(Math.random()*6)});
}

function drawComets(){
  // ship bounding box for collision
  const shipCh=13, shipLines=18, shipCw=8;
  const shipW=13*shipCw, shipH=shipLines*shipCh;
  const shipX=W()/2-shipW*0.5, shipY=H()-shipH-80;

  comets.forEach((c,i)=>{
    c.x+=c.vx; c.y+=c.vy*(0.5+warpSpeed);
    // shield collision: comet head near ship body
    if(c.x>shipX-10 && c.x<shipX+shipW+10 && c.y>shipY+20 && c.y<shipY+shipH){
      shields=Math.max(0,shields-0.8);
      comets[i]=null; return;
    }
    const chars=['O','o','*','+','.',',','`'];
    for(let j=0;j<c.len;j++){
      const ty=c.y-j*(12/c.vy)*1.5, tx=c.x-j*c.vx*1.5;
      if(ty<0) continue;
      ctx.fillStyle=j===0?BRIGHT:j<3?GREEN:j<6?'#22aa33':DIM;
      ctx.font=FONT(j===0?14:j<3?12:10);ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText(chars[Math.min(j,chars.length-1)],tx,ty);
    }
    if(c.y>H()+60) comets[i]=null;
  });
  comets=comets.filter(Boolean);
}

// ── FLYBY ──────────────────────────────────────────────────────────────────
function spawnFlyby(ship,isDestination){
  isDestination=!!isDestination;
  // estimate art pixel width from longest line * ~7px per char
  const scale=isDestination?1.05:0.85+Math.random()*0.3;
  const estArtW=Math.max(...ship.art.map(l=>l.length))*7*scale;
  const margin=20;
  const maxX=W()-estArtW-margin;
  let x;
  if(isDestination){
    x=Math.max(margin, Math.min(maxX, W()/2-estArtW*0.5));
  } else {
    x=margin+Math.random()*Math.max(0,maxX-margin);
  }
  flybyObjects.push({
    ship,x,y:-20,
    vx:isDestination?0:(Math.random()-0.5)*1.2,
    vy:isDestination?0.5:0.4+Math.random()*0.6,
    scale,
    age:0,announced:false,isDestination,lines:ship.art,
    battleActive:false,
    battleTimer:0,
    repelled:false,
    hoverX:0,hoverY:0,
    hovering:false,
    enemyHp:100,
    warned:false,
  });
}

function drawFlyby(){
  const lineH=11;
  flybyObjects.forEach((obj,i)=>{
    obj.age++;
    const artH=obj.lines.length*lineH*obj.scale;

    if(!obj.hovering){
      obj.x+=obj.vx;
      obj.y+=obj.vy*(obj.isDestination?0.4:0.6+warpSpeed*0.2);
      // only clamp evil ships; friendly contacts can drift off screen naturally
      if(obj.ship&&obj.ship.evil){
        const artPxW2=obj.lines[0].length*7*obj.scale;
        if(obj.x<0) obj.x=0;
        if(obj.x>W()-artPxW2) obj.x=W()-artPxW2;
      }

      if(obj.ship&&obj.ship.evil&&!obj.isDestination&&!obj.battleActive&&!obj.repelled){
        if(obj.y>H()*0.25){
          const artPxW=obj.lines[0].length*7*obj.scale;
          const margin=20;
          obj.hovering=true;
          obj.battleActive=true;
          obj.battleTimer=0;
          obj.hoverX=Math.max(margin, Math.min(W()-artPxW-margin, obj.x));
          obj.hoverY=obj.y;
          // first contact ever — show combat tutorial
          if(!combatTutShown){
            combatTutShown=true;
            combatTutActive=true;
            combatTutFrame=0;
            combatTutTyped=0;
          }
        }
      }
      if(obj.y>H()+artH+40){ flybyObjects[i]=null; return; }

    } else {
      if(!combatTutActive) obj.battleTimer++;
      obj.x=obj.hoverX+Math.sin(obj.age*0.03)*40;
      obj.y=obj.hoverY+Math.sin(obj.age*0.02)*15;

      // fire at player every 120 frames
      if(!obj.repelled && obj.battleTimer%120===60){
        const nose=shipNosePos();
        const artW=obj.lines[0].length*7*obj.scale;
        enemyWeapons.push({
          x:obj.x+artW*0.5, y:obj.y+artH*0.7,
          tx:nose.x, ty:nose.y,
          age:0, life:50
        });
      }

      if(obj.repelled){
        // retreating — fade up and out
        obj.hoverY-=6;
        if(obj.hoverY<-artH-40){ flybyObjects[i]=null; return; }
      } else if(obj.enemyHp<=0){
        // destroyed — spawn ASCII explosion at ship center
        const artW2=obj.lines[0].length*7*obj.scale;
        termPrint('TARGET DESTROYED — '+obj.ship.name,'bright');
        spawnExplosion(obj.x+artW2*0.5, obj.y+artH*0.4);
        flybyObjects[i]=null; enemyWeapons=[]; return;
      } else if(obj.battleTimer>0 && obj.battleTimer%300===0){
        // deal periodic damage every 5s while alive
        shields=Math.max(0,shields-(8+Math.random()*10));
        termPrint('SHIELDS TAKING DAMAGE: '+Math.floor(shields)+'%','bright');
      }
    }

    if(!obj.announced){
      obj.announced=true;
      if(obj.isDestination) termPrint('VISUAL: '+obj.ship.name+' ON SCREEN','bright');
      else{
        termPrint('CONTACT: '+obj.ship.name,'bright');
        if(obj.ship.evil) termPrint('HOSTILE VESSEL — FIRE WITHIN 10 SECONDS','bright');
      }
    }

    const fadeIn=Math.min(1,obj.age/30);
    const fadeOut=(!obj.hovering&&obj.y>H()-200)?Math.max(0,(H()-obj.y)/200):1;
    const battleFlash=obj.battleActive&&!obj.repelled&&obj.battleTimer>400&&Math.floor(obj.battleTimer/10)%2===0;

    ctx.save();
    ctx.font=Math.floor(10*obj.scale)+'px "Share Tech Mono",monospace';
    ctx.textBaseline='top';ctx.textAlign='left';
    obj.lines.forEach((line,j)=>{
      ctx.globalAlpha=fadeIn*fadeOut;
      ctx.fillStyle=battleFlash?'#ff4444':(obj.isDestination?(j%4===0?BRIGHT:GREEN):(j===0?BRIGHT:GREEN));
      ctx.fillText(line,obj.x,obj.y+j*lineH*obj.scale);
    });

    // fire countdown bar — only show while timer is active
    if(obj.battleActive&&!obj.repelled&&obj.battleTimer<=600){
      const barW=140, barX=obj.hoverX, barY=obj.hoverY+artH+4;
      const pct=Math.max(0,1-(obj.battleTimer/600));
      const timeLeft=Math.max(0,Math.ceil((600-obj.battleTimer)/60));
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(barX-2,barY-2,barW+60,14);
      ctx.fillStyle=pct>0.4?GREEN:'#ff4444';
      ctx.fillRect(barX,barY,barW*pct,8);
      ctx.strokeStyle=pct>0.4?GREEN:'#ff4444';ctx.lineWidth=0.5;ctx.strokeRect(barX,barY,barW,8);
      ctx.font='9px "Share Tech Mono",monospace';
      ctx.fillStyle=pct>0.4?GREEN:BRIGHT;ctx.textAlign='left';
      ctx.fillText('FIRE! '+timeLeft+'s',barX+barW+4,barY+4);
    }

    // enemy HP bar — always show while hovering and alive
    if(obj.hovering&&!obj.repelled&&obj.enemyHp>0){
      const hpBarX=obj.hoverX, hpBarY=obj.hoverY+artH+18;
      const hpW=140, hpPct=Math.max(0,obj.enemyHp/100);
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(hpBarX-2,hpBarY-2,hpW+60,14);
      ctx.fillStyle=hpPct>0.5?'#ff4422':hpPct>0.25?'#ff8800':'#ff0000';
      ctx.fillRect(hpBarX,hpBarY,hpW*hpPct,8);
      ctx.strokeStyle='#ff4422';ctx.lineWidth=0.5;ctx.strokeRect(hpBarX,hpBarY,hpW,8);
      ctx.font='9px "Share Tech Mono",monospace';
      ctx.fillStyle='#ff6644';ctx.textAlign='left';
      ctx.fillText('HP '+Math.ceil(obj.enemyHp)+'%',hpBarX+hpW+4,hpBarY+4);
    }

    ctx.globalAlpha=1;ctx.restore();
  });
  flybyObjects=flybyObjects.filter(Boolean);
}

// ── WEAPONS ────────────────────────────────────────────────────────────────
function shipNosePos(){
  // line 2 is ^ (nose tip), centered
  const ch=13, lines=18, cw=8, lineW=13;
  const sx=W()/2-lineW*cw*0.5;
  const sy=H()-lines*ch-80;
  // nose is at line index 2, horizontally centered on the ^ char (col 6 of 13)
  return { x: W()/2, y: sy + 2*ch + ch*0.5 };
}

function fireWeapon(type){
  const nose=shipNosePos();
  const cx=nose.x, sy=nose.y;
  let firedAtEnemy=false, firedAtFriendly=false;
  let targetX=cx, targetY=sy-H()*0.4;
  const dmg=type==="torpedoes"||type==="torpedo"?40:type==="phasers"?25:type==="lasers"||type==="laser"?35:0;
  const deferredComms=[];
  flybyObjects.forEach(obj=>{
    if(!obj||obj.isDestination) return;
    const artW2=obj.lines[0].length*7*obj.scale;
    const artH2=obj.lines.length*11*obj.scale;
    const objCX=obj.x+artW2*0.5, objCY=obj.y+artH2*0.5;
    if(obj.ship.evil&&obj.battleActive&&!obj.repelled){
      targetX=objCX; targetY=objCY;
      obj.enemyHp=Math.max(0,obj.enemyHp-dmg);
      firedAtEnemy=true;
      if(obj.enemyHp<=0) obj.battleActive=false;
    } else if(!obj.ship.evil&&obj.y>-200&&obj.y<H()+200&&obj.x>-300&&obj.x<W()+300){
      targetX=objCX; targetY=objCY;
      firedAtFriendly=true;
      if(obj.warned){
        obj.ship={...obj.ship,evil:true};
        obj.enemyHp=100; obj.battleActive=true; obj.hovering=true;
        obj.hoverX=obj.x; obj.hoverY=obj.y; obj.battleTimer=0;
        deferredComms.push(["[COMM] You just made an enemy. Congratulations.","bright"]);
        const r2=["THEY HAVE OPENED FIRE.","HOSTILE LOCK CONFIRMED.","THEY DID NOT TAKE THAT WELL."];
        deferredComms.push([r2[Math.floor(Math.random()*r2.length)],"bright"]);
      } else {
        obj.warned=true;
        const warn=["[COMM] What are you DOING?! Stand down!","[COMM] Are you out of your mind? Check your targeting!","[COMM] HEY. That was us. Lower your weapons.","[COMM] Friendly vessel here! Power down your weapons!"];
        deferredComms.push([warn[Math.floor(Math.random()*warn.length)],"bright"]);
        deferredComms.push(["Type  sorry  to de-escalate.","dim"]);
        if(!friendlyFireTutShown){friendlyFireTutShown=true;friendlyFireTutActive=true;friendlyFireTutFrame=0;friendlyFireTutTyped=0;}
      }
    }
  });
  if(firedAtEnemy) enemyWeapons=[];
  if(type==="phasers"){
    for(let i=0;i<3;i++) weapons.push({type:"phaser",age:0,life:30,x:cx+(i-1)*20,y:sy,tx:targetX+(Math.random()-0.5)*40,ty:targetY+(Math.random()-0.5)*40});
    termPrint(firedAtEnemy?"PHASERS — HIT! (-25 HP)":firedAtFriendly?"PHASERS FIRED — FRIENDLY HIT":"PHASERS FIRED","bright");
  } else if(type==="torpedoes"||type==="torpedo"){
    for(let i=0;i<2;i++){const dx=targetX-(cx+(i?12:-12)),dy=targetY-sy,dist=Math.sqrt(dx*dx+dy*dy)||1,spd=8;weapons.push({type:"torpedo",age:0,life:70,x:cx+(i?12:-12),y:sy,vx:(dx/dist)*spd,vy:(dy/dist)*spd,tx:targetX,ty:targetY});}
    termPrint(firedAtEnemy?"TORPEDOES — HIT! (-40 HP)":firedAtFriendly?"TORPEDOES FIRED — FRIENDLY HIT":"PHOTON TORPEDOES AWAY","bright");
  } else if(type==="lasers"||type==="laser"){
    weapons.push({type:"laser",age:0,life:20,x:cx,y:sy,tx:targetX,ty:targetY,spread:60});
    termPrint(firedAtEnemy?"LASERS — HIT! (-35 HP)":firedAtFriendly?"LASERS FIRED — FRIENDLY HIT":"LASER BANKS FIRING","bright");
  } else {
    termPrint("UNKNOWN WEAPON: "+type+". Try: phasers, torpedoes, lasers","dim");
  }
  deferredComms.forEach(([msg,cls])=>termPrint(msg,cls));
}

function drawWeapons(){
  weapons.forEach((w,i)=>{
    w.age++;
    if(w.age>w.life){weapons[i]=null;return;}
    const t=w.age/w.life; ctx.globalAlpha=1-t;
    if(w.type==='phaser'){
      ctx.strokeStyle='#88ff44';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.lineTo(w.tx,w.ty);ctx.stroke();
      ctx.strokeStyle=BRIGHT;ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.lineTo(w.tx+(Math.random()-0.5)*15,w.ty+(Math.random()-0.5)*15);ctx.stroke();
    } else if(w.type==='torpedo'){
      w.x+=w.vx; w.y+=w.vy;
      ['@','*','o','.'].forEach((ch,j)=>{
        ctx.fillStyle=j===0?BRIGHT:GREEN;ctx.font=FONT(j===0?16:12);
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ch,w.x,w.y-j*12);
      });
      if(w.age>w.life-8){
        for(let b=0;b<8;b++){
          const ang=b/8*Math.PI*2, r=18*(w.age-(w.life-8))*3;
          ctx.fillStyle=b%2===0?BRIGHT:GREEN;ctx.font=FONT(13);
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('*',w.x+Math.cos(ang)*r,w.y+Math.sin(ang)*r);
        }
      }
    } else if(w.type==='laser'){
      // aim toward stored target
      const dx=w.tx-w.x, dy=w.ty-w.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const spread=w.spread*(1-t*0.5);
      for(let b=-2;b<=2;b++){
        const perpX=-dy/dist*b*8, perpY=dx/dist*b*8;
        ctx.strokeStyle=b===0?BRIGHT:GREEN;ctx.lineWidth=b===0?3:1;
        ctx.beginPath();
        ctx.moveTo(w.x+perpX,w.y+perpY);
        ctx.lineTo(w.tx+perpX*(1-t),w.ty+perpY*(1-t));
        ctx.stroke();
      }
      ctx.fillStyle=BRIGHT;ctx.font=FONT(20);ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('*',w.tx,w.ty+Math.random()*10-5);
    }
    ctx.globalAlpha=1;
  });
  weapons=weapons.filter(Boolean);
}

// ── ENEMY WEAPONS ──────────────────────────────────────────────────────────
function drawEnemyWeapons(){
  enemyWeapons.forEach((w,i)=>{
    w.age++;
    if(w.age>w.life){enemyWeapons[i]=null;return;}
    const t=w.age/w.life;
    ctx.globalAlpha=0.9*(1-t*0.3);

    if(w.explode){
      // expanding explosion burst
      const bx=w.x+(w.tx-w.x)*t;
      const by=w.y+(w.ty-w.y)*t;
      ctx.fillStyle=t<0.5?BRIGHT:'#ff6644';
      ctx.font=FONT(14);ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('*',bx,by);
    } else {
      // travelling bolt
      const bx=w.x+(w.tx-w.x)*t;
      const by=w.y+(w.ty-w.y)*t;
      const seg=0.08;
      const t0=Math.max(0,t-seg);
      const px=w.x+(w.tx-w.x)*t0;
      const py=w.y+(w.ty-w.y)*t0;
      ctx.strokeStyle='#ff4422'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(bx,by); ctx.stroke();
      ctx.fillStyle='#ff6644'; ctx.font=FONT(11);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('*',bx,by);
    }
    ctx.globalAlpha=1;
  });
  enemyWeapons=enemyWeapons.filter(Boolean);
}

// ── ASCII EXPLOSION ─────────────────────────────────────────────────────────

function spawnExplosion(cx,cy){
  explosions.push({cx,cy,age:0,life:90});
}

function drawExplosions(){
  // Each frame of the explosion is a different ASCII art pattern
  const frames=[
    // frame 0-15: small spark
    ['  * ','*   *','  * '],
    // frame 16-30: growing
    [' \\|/ ','- * -',' /|\\ '],
    // frame 31-45: medium burst
    [' \\ | / ','-- * --',' / | \\ ','   |   '],
    // frame 46-60: large
    ['  \\\\|//  ','--  *  --','  //|\\\\  '],
    // frame 61-75: fragmenting
    ['\\ . | . /','  `   `  ','/ . | . \\'],
    // frame 76-90: dying embers
    ['  . . .  ','  .   .  ','  . . .  '],
  ];
  explosions.forEach((ex,i)=>{
    ex.age++;
    if(ex.age>ex.life){explosions[i]=null;return;}
    const t=ex.age/ex.life;
    const fi=Math.min(frames.length-1,Math.floor(t*frames.length));
    const art=frames[fi];
    const scale=1+t*1.5; // grows then shrinks
    const alpha=t<0.7?1:1-(t-0.7)/0.3;
    const charH=14*scale;
    ctx.save();
    ctx.font=Math.floor(12*scale)+'px "Share Tech Mono",monospace';
    ctx.textBaseline='middle';ctx.textAlign='center';
    art.forEach((line,j)=>{
      ctx.globalAlpha=alpha;
      const col=t<0.3?BRIGHT:t<0.6?'#ff8844':'#ff4422';
      ctx.fillStyle=col;
      ctx.fillText(line,ex.cx,ex.cy+(j-art.length/2)*charH);
    });
    ctx.globalAlpha=1;ctx.restore();
  });
  explosions=explosions.filter(Boolean);
}

// ── WARP ANIMATION ─────────────────────────────────────────────────────────
function triggerWarpAnimation(onDone){
  warpAnimating=true;hyperdrive=true;
  flybyObjects.forEach(obj=>{if(obj&&obj.isDestination) obj.vy=80;});
  let f=0;const oldTarget=targetWarp;
  const iv=setInterval(()=>{
    f++;
    if(f<30) targetWarp=Math.min(1.0,f/30);
    else if(f<80) targetWarp=1.0;
    else if(f<120) targetWarp=oldTarget;
    else{warpAnimating=false;hyperdrive=false;clearInterval(iv);if(onDone) onDone();}
  },16);
}

function startDock(mode){
  // mode: 'refuel' or 'repair'
  if(dockPhase!=='none') return;
  if(mode==='refuel'){
    if(refueling) return;
    refueling=true; refuelTimer=0; fuelAtDock=fuel;
    termPrint('FUEL CRITICAL — JUMPING TO DEEP SPACE 9...','bright');
  } else {
    if(repairing) return;
    repairing=true; repairTimer=0; shieldsAtDock=shields;
    termPrint('HULL DAMAGE — JUMPING TO DEEP SPACE 9 FOR REPAIRS...','bright');
    // also refuel if below 50%
    if(fuel<50){ refueling=true; refuelTimer=0; fuelAtDock=fuel;
      termPrint('FUEL LOW — WILL REFUEL DURING REPAIR RUN','dim'); }
  }
  hyperdrive=true; warpFactor=0; targetWarp=0;
  flybyObjects.forEach(obj=>{if(obj&&obj.isDestination) obj.vy=80;});
  setTimeout(()=>{
    hyperdrive=false; dockPhase='descending'; dockY=-520;
    termPrint('DEEP SPACE 9 ACQUIRED — DOCKING INITIATED','bright');
  },2000);
}

function drawSpaceport(){
  if(dockPhase==='none') return;
  const charH=12;

  ctx.font=charH+'px "Share Tech Mono",monospace';
  let artPxW=0;
  SPACEPORT_ART.forEach(l=>{ const w=ctx.measureText(l).width; if(w>artPxW) artPxW=w; });
  const artPxH=SPACEPORT_ART.length*charH;

  // ship nose tip is line index 2 (the ^ char) of ship art
  const shipCh=13, shipLines=18;
  const shipNoseY=H()-shipLines*shipCh-80+2*shipCh;

  // center DS9 over ship; bottom of art sits 8px above nose
  const targetDockedX=W()/2-artPxW*0.5;
  const targetDockedY=shipNoseY-artPxH-8;

  if(dockPhase==='descending'){
    dockY+=3;
    if(dockY>=targetDockedY){
      dockY=targetDockedY; dockPhase='docked';
      termPrint('DOCKING CLAMPS ENGAGED — DS9','bright');
      const iv=setInterval(()=>{
        if(dockPhase!=='docked'){clearInterval(iv);return;}
        if(refueling){
          refuelTimer++;
          const needed=100-fuelAtDock;
          fuel=Math.min(100,fuelAtDock+refuelTimer*(needed/160));
          if(fuel>=100) fuel=100;
        }
        if(repairing){
          repairTimer++;
          const needed=100-shieldsAtDock;
          shields=Math.min(100,shieldsAtDock+repairTimer*(needed/160));
          if(shields>=100) shields=100;
        }
        const fuelDone=!refueling||(fuel>=100);
        const repairDone=!repairing||(shields>=100);
        if(fuelDone&&repairDone){
          refueling=false; repairing=false; clearInterval(iv);
          dockPhase='departing';
          termPrint('SERVICES COMPLETE — RELEASING CLAMPS','bright');
          termPrint('DEEP SPACE 9 DEPARTING...','dim');
        }
      },250);
    }
  } else if(dockPhase==='departing'){
    dockY+=1.2;
    if(dockY>H()+40){ dockPhase='none'; termPrint('DS9 CLEAR — GOOD HUNTING','dim'); }
  }

  const fadeAlpha=dockPhase==='descending'
    ?Math.min(1,(dockY+520)/260)
    :dockPhase==='departing'
      ?Math.max(0,1-(dockY-targetDockedY)/300)
      :1;

  ctx.save();
  ctx.font=charH+'px "Share Tech Mono",monospace';
  ctx.textBaseline='top'; ctx.textAlign='left';
  SPACEPORT_ART.forEach((line,i)=>{
    ctx.globalAlpha=Math.max(0,Math.min(1,fadeAlpha));
    ctx.fillStyle=(i>=14&&i<=16)?BRIGHT:(i%4===0)?'#44ff55':GREEN;
    ctx.fillText(line,targetDockedX,dockY+i*charH);
  });

  if(dockPhase==='docked'){
    const clampX=W()/2;
    const clampFromY=dockY+artPxH;
    const clampToY=shipNoseY-2;
    ctx.strokeStyle=BRIGHT; ctx.lineWidth=1;
    ctx.globalAlpha=0.6+0.4*Math.sin(frame*0.15);
    ctx.setLineDash([3,4]);
    ctx.beginPath();
    ctx.moveTo(clampX-4,clampFromY); ctx.lineTo(clampX-4,clampToY);
    ctx.moveTo(clampX+4,clampFromY); ctx.lineTo(clampX+4,clampToY);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawFalcon(){
  if(falconPhase==='none') return;
  const art = rescueType==='enterprise' ? ENTERPRISE_ART : FALCON_ART;
  const charH=11;
  const artW=art.reduce((m,l)=>Math.max(m,l.length),0)*7;
  const artH=art.length*charH;

  if(falconPhase==='inbound'||falconPhase==='firing'||falconPhase==='towing'){
    // find enemy position to avoid overlapping it
    let enemyX=W()/2, enemyW=200;
    flybyObjects.forEach(obj=>{
      if(obj&&obj.ship&&obj.ship.evil&&obj.hovering){
        enemyW=obj.lines[0].length*7*obj.scale;
        enemyX=obj.hoverX+enemyW*0.5;
      }
    });
    // decide which side has more room — place rescuer on opposite side with 120px buffer
    const bufferPx=120;
    let targetX, targetY;
    if(enemyX < W()*0.5){
      // enemy is left — rescuer goes right
      targetX = enemyX + enemyW*0.5 + bufferPx;
    } else {
      // enemy is right — rescuer goes left
      targetX = enemyX - enemyW*0.5 - artW - bufferPx;
    }
    // clamp to screen
    targetX = Math.max(20, Math.min(W()-artW-20, targetX));
    targetY = rescueType==='enterprise' ? H()*0.12 : H()*0.18;

    const speed = falconPhase==='towing' ? 0.02 : 0.04;
    falconX+=(targetX-falconX)*speed;
    falconY+=(targetY-falconY)*speed;
    if(falconPhase==='firing'){
      falconX+=Math.sin(frame*0.04)*1.2;
      falconY+=Math.cos(frame*0.03)*0.8;
    }
  } else if(falconPhase==='departing'){
    // depart away from center
    falconX += falconX > W()/2 ? 14 : -14;
    falconY-=3;
  }

  if(falconX<-artW-100) return;

  ctx.save();
  ctx.font=charH+'px "Share Tech Mono",monospace';
  ctx.textBaseline='top'; ctx.textAlign='left';
  art.forEach((line,i)=>{
    ctx.globalAlpha=0.95;
    ctx.fillStyle= rescueType==='enterprise'
      ? (i>=5&&i<=7?BRIGHT:i%4===0?'#44ff55':GREEN)
      : (i===11||i===12?BRIGHT:i%3===0?'#44ff55':GREEN);
    ctx.fillText(line,falconX,falconY+i*charH);
  });

  if(falconPhase==='towing'&&dockPhase==='none'){
    const nose=shipNosePos();
    // from right edge of rescuer art, vertically centered
    const towFromX=falconX+artW;
    const towFromY=falconY+artH*0.5;
    ctx.strokeStyle=DIM; ctx.lineWidth=1;
    ctx.globalAlpha=0.5+0.3*Math.sin(frame*0.1);
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(towFromX,towFromY); ctx.lineTo(nose.x,nose.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.globalAlpha=1; ctx.restore();
}

termIn.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const raw=termIn.value.trim(); termIn.value='';
  if(!raw) return;
  // during intro hold screen, only accept 'launch'
  if(introActive){
    termPrint('> '+raw,'dim');
    handleIntroCcommand(raw.toLowerCase());
    return;
  }
  termPrint('> '+raw,'dim');
  handleCommand(raw.toLowerCase());
});

function handleCommand(cmd){
  if(cmd==='?'||cmd==='help'){HELP.forEach(l=>termPrint(l,'dim'));return;}
  if(cmd==='destinations'){
    termPrint('AVAILABLE DESTINATIONS:','bright');
    Object.keys(DESTINATIONS).forEach(k=>termPrint('  '+k+' -- '+DESTINATIONS[k].display,'dim'));
    return;
  }
  if(cmd.startsWith('warp ')){
    if(dockPhase!=='none'){termPrint('CANNOT CHANGE WARP — DOCKING CLAMPS ENGAGED','dim');return;}
    const n=parseFloat(cmd.slice(5));
    if(isNaN(n)||n<0||n>9){termPrint('WARP: enter 0-9','dim');return;}
    warpFactor=n;targetWarp=n/9;termPrint('WARP FACTOR '+n+' ENGAGED','bright');return;
  }
  if(cmd.startsWith('nav ')||cmd.startsWith('navigate ')){
    if(dockPhase!=='none'){termPrint('CANNOT NAVIGATE — DOCKING CLAMPS ENGAGED','dim');return;}
    const key=cmd.startsWith('nav ')?cmd.slice(4).trim():cmd.slice(9).trim();
    const normalized=key.replace(/\s+/g,'');
    const dest=DESTINATIONS[normalized]||DESTINATIONS[key];
    if(!dest){termPrint('UNKNOWN: '+key+'. Type "destinations" for list.','dim');return;}
    destName=dest.display;
    termPrint('PLOTTING COURSE TO '+dest.display.toUpperCase()+'...','bright');
    triggerWarpAnimation(()=>{
      termPrint('ARRIVED: '+dest.display.toUpperCase(),'bright');
      spawnFlyby({name:dest.display,art:dest.art},true);
    });
    return;
  }
  if(cmd==='impulse'){
    if(dockPhase!=='none'){termPrint('CANNOT ENGAGE IMPULSE — DOCKING CLAMPS ENGAGED','dim');return;}
    warpFactor=0;targetWarp=0;termPrint('IMPULSE ONLY — THRUSTERS AT MINIMUM','bright');return;
  }
  if(cmd==='hyperdrive'){
    if(dockPhase!=='none'){termPrint('CANNOT ENGAGE HYPERDRIVE — DOCKING CLAMPS ENGAGED','dim');return;}
    if(fuel<20){termPrint('HYPERDRIVE FAILED — INSUFFICIENT FUEL','bright');return;}
    const burn=20+Math.random()*30; hyperdriveBurnRemaining=burn; hyperdrive=true;
    // blast all contacts off screen — including enemies
    const hadEnemy=flybyObjects.some(obj=>obj&&obj.ship&&obj.ship.evil&&obj.hovering);
    flybyObjects.forEach(obj=>{
      if(!obj) return;
      obj.vy=80; obj.hovering=false; obj.battleActive=false; obj.repelled=true;
    });
    enemyWeapons=[];
    if(hadEnemy) termPrint('HYPERDRIVE ENGAGED — ENEMY CONTACT LOST','bright');
    else termPrint('HYPERDRIVE ENGAGED — BURNING '+Math.floor(burn)+'% FUEL','bright');
    setTimeout(()=>{
      hyperdrive=false; hyperdriveBurnRemaining=0;
      termPrint('HYPERDRIVE DISENGAGED','dim');
      if(fuel<20) termPrint('FUEL CRITICAL — TYPE: refuel','bright');
    },3000);
    return;
  }
  if(cmd==='refuel'){
    if(dockPhase!=='none'){termPrint('ALREADY DOCKED — STAND BY','dim');return;}
    if(fuel>=100){termPrint('FUEL ALREADY FULL','dim');return;}
    startDock('refuel');return;
  }
  if(cmd==='repair'){
    if(dockPhase!=='none'){termPrint('ALREADY DOCKED — STAND BY','dim');return;}
    if(shields>=100){termPrint('SHIELDS ALREADY FULL','dim');return;}
    startDock('repair');return;
  }
  if(cmd.startsWith('fire ')){fireWeapon(cmd.slice(5).trim());return;}
  // shorthand: "fire phasers" also works as just "phasers" etc
  if(cmd==='spawn friendly'){
    const friendlies=CONTACT_SHIPS.filter(s=>!s.evil);
    const ship=friendlies[Math.floor(Math.random()*friendlies.length)];
    spawnFlyby(ship,false);
    termPrint('SPAWNING: '+ship.name,'dim');
    return;
  }
  if(cmd==='spawn enemy'){
    const evil=CONTACT_SHIPS.filter(s=>s.evil);
    const ship=evil[Math.floor(Math.random()*evil.length)];
    spawnFlyby(ship,false);
    termPrint('SPAWNING: '+ship.name,'dim');
    return;
  }
  if(cmd==='spawn falcon'){
    if(falconTriggered){termPrint('RESCUE ALREADY IN PROGRESS','dim');return;}
    startFalconRescue(); return;
  }
  if(cmd==='spawn picard'){
    if(falconTriggered){termPrint('RESCUE ALREADY IN PROGRESS','dim');return;}
    startPicardRescue(); return;
  }
  if(cmd==='sorry'||cmd==='sorry!'||cmd==='apologise'||cmd==='apologize'){
    let found=false;
    flybyObjects.forEach(obj=>{
      if(obj&&obj.ship&&!obj.ship.evil&&obj.warned){
        obj.warned=false;
        found=true;
        const replies=[
          '[COMM] ...Fine. Watch where you point that thing.',
          '[COMM] Consider this a warning. Do not do that again.',
          '[COMM] Apology noted. We are standing down.',
          '[COMM] Next time we fire back. Safe travels.',
        ];
        termPrint(replies[Math.floor(Math.random()*replies.length)],'bright');
      }
    });
    if(!found) termPrint('Nothing to apologise for — yet.','dim');
    return;
  }
  termPrint('UNKNOWN COMMAND: "'+cmd+'". Type ? for help.','dim');
}

// Build cumulative startChar for both sequences
function buildLines(arr){
  let y=0, total=0, out=[];
  arr.forEach(l=>{
    out.push({...l, y, startChar:total});
    total += l.text.length + 6;
    y += l.gap;
  });
  out._total=total;
  return out;
}
let introLines   = buildLines(INTRO_LINES);
let consoleLines = buildLines(CONSOLE_LINES);

// intro state
// phases: 'typing_intro' | 'pause' | 'typing_console' | 'hold'
let introPhase      = 'typing_intro';
let introHoldFrame  = 0;
let introPauseFrame = 0;
let consoleTypingFrame = 0;
let consoleFadeAlpha   = 0; // terminal window fade
let launchFading    = false;
let launchFadeFrame = 0;

function lineColor(l){
  if(l.col==='title') return BRIGHT;
  if(l.col==='key')   return '#88ffaa';
  if(l.col==='dim')   return DIM;
  return GREEN;
}

function drawIntroLines(lines, charsTyped, startY, alpha){
  ctx.textBaseline='top'; ctx.textAlign='center';
  lines.forEach((line,idx)=>{
    if(charsTyped < line.startChar) return;
    const charsSoFar = Math.min(charsTyped - line.startChar, line.text.length);
    const visible = line.text.slice(0, charsSoFar);
    if(!visible && !line.text) return;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = lineColor(line);
    ctx.font = line.size+'px "Share Tech Mono",monospace';
    ctx.fillText(visible, W()/2, startY+line.y);
    // blinking cursor on active line
    if(charsSoFar < line.text.length && Math.floor(introFrame/8)%2===0){
      const tw=ctx.measureText(visible).width;
      ctx.fillStyle=BRIGHT;
      ctx.fillText('_', W()/2+tw/2+5, startY+line.y);
    }
  });
  ctx.globalAlpha=1;
}

function drawIntro(){
  introFrame++;
  ctx.fillStyle=BG; ctx.fillRect(0,0,W(),H());

  // layout: intro block starts near top-centre, console below it
  const introTotalH = introLines[introLines.length-1].y + introLines[introLines.length-1].gap;
  const consoleTotalH = consoleLines[consoleLines.length-1].y + consoleLines[consoleLines.length-1].gap;
  const totalH = introTotalH + 20 + consoleTotalH;
  const startY = Math.max(24, H()/2 - totalH/2);
  const consoleStartY = startY + introTotalH + 20;

  if(introPhase==='typing_intro'){
    const charsTyped = introFrame;
    drawIntroLines(introLines, charsTyped, startY, 1);
    if(charsTyped >= introLines._total){
      if(!introLines._doneAt) introLines._doneAt = introFrame;
      if(introFrame - introLines._doneAt > 300){ // 5s pause
        introPhase='typing_console';
        consoleTypingFrame=0;
        // show terminal with fade
        document.getElementById('terminal').style.display='block';
        document.getElementById('term-input').focus();
      }
    }

  } else if(introPhase==='typing_console'){
    consoleTypingFrame++;
    // intro text stays fully visible
    drawIntroLines(introLines, 999999, startY, 1);

    // console window fades in once "NAVIGATION CONSOLE READY." is typed
    const ncr = consoleLines[1]; // index 1 = "NAVIGATION CONSOLE READY."
    const ncrTyped = consoleTypingFrame >= ncr.startChar + ncr.text.length + 6;
    if(ncrTyped) consoleFadeAlpha = Math.min(1, consoleFadeAlpha + 0.015);

    // type console lines
    drawIntroLines(consoleLines, consoleTypingFrame, consoleStartY, 1);

    if(consoleTypingFrame >= consoleLines._total){
      if(!consoleLines._doneAt) consoleLines._doneAt = consoleTypingFrame;
      if(consoleTypingFrame - consoleLines._doneAt > 30) introPhase='hold';
    }

    // terminal fade
    document.getElementById('terminal').style.opacity = consoleFadeAlpha;

  } else if(introPhase==='hold'){
    // keep everything visible, pulse the last line
    drawIntroLines(introLines, 999999, startY, 1);
    consoleFadeAlpha = Math.min(1, consoleFadeAlpha+0.02);

    // draw console lines, pulse last one
    ctx.textBaseline='top'; ctx.textAlign='center';
    consoleLines.forEach((line,idx)=>{
      if(!line.text) return;
      const isLast = idx===consoleLines.length-1;
      const pulse = isLast ? (0.6+0.4*Math.sin(introFrame*0.08)) : 1;
      ctx.globalAlpha=pulse;
      ctx.fillStyle=lineColor(line);
      ctx.font=line.size+'px "Share Tech Mono",monospace';
      ctx.fillText(line.text, W()/2, consoleStartY+line.y);
    });
    ctx.globalAlpha=1;
    document.getElementById('terminal').style.opacity = consoleFadeAlpha;
  }

  // launch fade-out
  if(launchFading){
    launchFadeFrame++;
    const fade = Math.min(1, launchFadeFrame/50);
    ctx.fillStyle=BG; ctx.globalAlpha=fade; ctx.fillRect(0,0,W(),H()); ctx.globalAlpha=1;
    if(launchFadeFrame>50){
      introActive=false;
    }
  }
}

function handleIntroCcommand(cmd){
  if(cmd==='launch'){
    if(introPhase!=='hold'){
      termPrint('STAND BY — SYSTEMS INITIALISING...','dim');
      return;
    }
    termPrint('LAUNCH SEQUENCE INITIATED — GODSPEED.','bright');
    launchFading=true;
  } else {
    handleCommand(cmd);
  }
}

function drawCombatTutorial(){
  if(!combatTutActive) return;
  combatTutFrame++;

  // semi-transparent overlay — don't fully pause, ship + enemy stay visible
  ctx.fillStyle='rgba(0,0,0,0.72)';
  ctx.fillRect(0,0,W(),H());

  const panW=Math.min(460,W()-60), panH=340;
  const panX=W()/2-panW/2, panY=H()/2-panH/2;

  // panel background + border
  ctx.fillStyle='rgba(0,6,0,0.96)';
  ctx.strokeStyle='#ff4422'; ctx.lineWidth=1.5;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(panX,panY,panW,panH,4);
  else ctx.rect(panX,panY,panW,panH);
  ctx.fill(); ctx.stroke();

  // pulsing red warning header
  const pulse=0.7+0.3*Math.sin(combatTutFrame*0.15);
  ctx.globalAlpha=pulse;
  ctx.fillStyle='#ff4422'; ctx.font='bold 14px "Share Tech Mono",monospace';
  ctx.textBaseline='top'; ctx.textAlign='center';
  ctx.fillText('! ! !  UNDER ATTACK  ! ! !', W()/2, panY+10);
  ctx.globalAlpha=1;

  // divider
  ctx.strokeStyle='#ff4422'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(panX+14,panY+30); ctx.lineTo(panX+panW-14,panY+30); ctx.stroke();

  // type out the lines
  const allText = COMBAT_TUT_LINES.join('\n');
  combatTutTyped = Math.min(allText.length, combatTutTyped+1.5);
  const visible = allText.slice(0, Math.floor(combatTutTyped));
  const visLines = visible.split('\n');

  ctx.font='12px "Share Tech Mono",monospace';
  ctx.textAlign='left';
  visLines.forEach((ln,i)=>{
    const isCmd = ln.indexOf('  fire')===0;
    const isHeader = ln===COMBAT_TUT_LINES[0];
    const isEmpty = ln==='';
    ctx.fillStyle = isHeader ? '#ff6644' : isCmd ? BRIGHT : isEmpty ? '' : GREEN;
    if(!isEmpty) ctx.fillText(ln, panX+16, panY+38+i*17);
  });

  // cursor while typing
  const done = combatTutTyped >= allText.length;
  if(!done && Math.floor(combatTutFrame/8)%2===0){
    const last=visLines[visLines.length-1];
    ctx.fillStyle=BRIGHT;
    ctx.fillText('_', panX+16+ctx.measureText(last).width+2,
      panY+38+(visLines.length-1)*17);
  }

  // dismiss prompt
  if(done){
    ctx.globalAlpha=0.5+0.5*Math.sin(combatTutFrame*0.09);
    ctx.fillStyle='#ff4422'; ctx.font='10px "Share Tech Mono",monospace';
    ctx.textAlign='center';
    ctx.fillText('SPACE  /  ENTER  /  CLICK  to dismiss', W()/2, panY+panH-12);
    ctx.globalAlpha=1;
  }
}

function dismissCombatTut(){
  if(!combatTutActive) return;
  const allText=COMBAT_TUT_LINES.join('\n');
  if(combatTutTyped < allText.length){ combatTutTyped=allText.length; return; }
  combatTutActive=false;
}

  if(combatTutActive&&(e.key===' '||e.key==='Enter')){ e.preventDefault(); dismissCombatTut(); }
});

    return;
  }
  if(e.key==='Backspace'){ namingInput=namingInput.slice(0,-1); return; }
  if(e.key.length===1 && namingInput.length<24){ namingInput+=e.key; }
});

let hudTutActive  = true;
let hudStep       = 0;
let hudStepFrame  = 0;
let hudTypedChars = 0;
let hudWaiting    = false;

function advanceHud(){
  if(!hudTutActive) return;
  if(!hudWaiting){ hudTypedChars=99999; return; }
  hudStep++;
  if(hudStep >= HUD_STEPS.length){
    hudTutActive=false;
    document.getElementById('terminal').style.display='block';
    document.getElementById('term-input').focus();
    return;
  }
  hudStepFrame=0; hudTypedChars=0; hudWaiting=false;
}

window.addEventListener('keydown',e=>{
  if(!hudTutActive) return;
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); advanceHud(); }
});
window.addEventListener('click',()=>{ if(hudTutActive) advanceHud(); });

function drawHudTutorial(){
  hudStepFrame++;
  ctx.fillStyle=BG; ctx.fillRect(0,0,W(),H());
  drawStars();
  drawShip();

  // always draw the HUD bar backgrounds
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W(),24);
  const bh=80; ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,H()-bh,W(),bh);
  // vessel name at centre of top bar
  if(vesselName){
    ctx.fillStyle='#77ee88'; ctx.font='12px "Share Tech Mono",monospace';
    ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText(vesselName, W()/2, 12);
  }

  // dim overlay over the whole scene
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W(),H());

  // redraw HUD bar backgrounds over dim so elements can sit on them
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W(),24);
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,H()-bh,W(),bh);

  // draw all completed steps at full brightness (persistent)
  for(let s=0; s<hudStep; s++){
    ctx.globalAlpha=0.55;
    HUD_STEPS[s].draw(ctx,W(),H());
    ctx.globalAlpha=1;
  }

  // draw current step fully highlighted
  HUD_STEPS[hudStep].draw(ctx,W(),H());

  // always keep terminal visible during tutorial
  document.getElementById('terminal').style.display='block';

  // description panel — float above bottom bar for bottom elements
  const step = HUD_STEPS[hudStep];
  const isBottomStep = step.draw.toString().includes('H-bh');
  const panW=Math.min(500,W()-80), panH=190;
  const panX=W()/2-panW/2;
  const panY=isBottomStep ? Math.max(30, H()*0.28) : H()/2-panH/2;

  ctx.fillStyle='rgba(0,4,0,0.93)';
  ctx.strokeStyle=GREEN; ctx.lineWidth=1;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(panX,panY,panW,panH,4);
  else ctx.rect(panX,panY,panW,panH);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle=DIM; ctx.font='10px "Share Tech Mono",monospace';
  ctx.textBaseline='top'; ctx.textAlign='right';
  ctx.fillText((hudStep+1)+' of '+HUD_STEPS.length, panX+panW-10, panY+8);

  ctx.fillStyle=BRIGHT; ctx.font='15px "Share Tech Mono",monospace';
  ctx.textAlign='left';
  ctx.fillText('\u25b6 '+step.label, panX+14, panY+10);

  ctx.strokeStyle=DIM; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(panX+14,panY+32); ctx.lineTo(panX+panW-14,panY+32); ctx.stroke();

  const allDesc = step.desc.join('\n');
  if(!hudWaiting) hudTypedChars = Math.min(allDesc.length, hudTypedChars+1.8);
  const visible = allDesc.slice(0, Math.floor(hudTypedChars));
  const visLines = visible.split('\n');

  ctx.font='13px "Share Tech Mono",monospace';
  visLines.forEach((ln,i)=>{
    ctx.fillStyle = i===0 ? GREEN : DIM;
    ctx.fillText(ln, panX+14, panY+42+i*22);
  });

  if(hudTypedChars >= allDesc.length){
    hudWaiting=true;
  } else if(Math.floor(hudStepFrame/8)%2===0){
    const last=visLines[visLines.length-1];
    ctx.fillStyle=BRIGHT;
    ctx.fillText('_', panX+14+ctx.measureText(last).width+3, panY+42+(visLines.length-1)*22);
  }

  if(hudWaiting){
    ctx.globalAlpha=0.5+0.5*Math.sin(hudStepFrame*0.09);
    ctx.fillStyle=DIM; ctx.font='10px "Share Tech Mono",monospace'; ctx.textAlign='center';
    ctx.fillText('SPACE  /  ENTER  /  CLICK  to continue', W()/2, panY+panH-12);
    ctx.globalAlpha=1;
  }
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
resize();
window.addEventListener('resize',resize);

function loop(){
  if(introActive){
    drawIntro();
    requestAnimationFrame(loop); return;
  }

  if(frame===0){
    document.getElementById('terminal').style.opacity='1';
    document.getElementById('terminal').style.display='block'; // visible for console step
    const termOut=document.getElementById('term-output');
    termOut.innerHTML='<span class="bright">NerdFlight v5.0.1 \u2014 TYPE ? FOR HELP</span>';
    lastContactFrame=0; gameFadeFrame=0;
  }

  frame++; gameFadeFrame++;

  const docking=(dockPhase==='descending'||dockPhase==='docked'||dockPhase==='departing');
  const effectiveWarp=docking?Math.min(warpSpeed,0.02):warpSpeed;
  const savedWS=warpSpeed; warpSpeed=effectiveWarp; updateStars(); warpSpeed=savedWS;
  warpSpeed+=(targetWarp-warpSpeed)*0.06;

  // Phase 1: star + ship fade-in
  if(gameFadeFrame<=GAME_FADE_DONE){
    ctx.fillStyle=BG; ctx.fillRect(0,0,W(),H());
    const sa=Math.min(1,gameFadeFrame/GAME_FADE_STARS);
    const sha=gameFadeFrame<GAME_FADE_SHIP?0:Math.min(1,(gameFadeFrame-GAME_FADE_SHIP)/60);
    ctx.globalAlpha=sa; drawStars(); ctx.globalAlpha=1;
    ctx.globalAlpha=sha; drawShip(); ctx.globalAlpha=1;
    requestAnimationFrame(loop); return;
  }

  // Phase 2: vessel naming
  if(namingActive){
    drawNamingScreen();
    requestAnimationFrame(loop); return;
  }

  // Phase 3: HUD tutorial
  if(hudTutActive){
    drawHudTutorial();
    requestAnimationFrame(loop); return;
  }

  // Phase 3: live game
  if(document.getElementById('terminal').style.display==='none'){
    document.getElementById('terminal').style.display='block';
    document.getElementById('term-input').focus();
  }

  ctx.fillStyle=BG; ctx.fillRect(0,0,W(),H());
  if(warpSpeed>0.05&&!docking) fuel=Math.max(0,fuel-warpSpeed*0.003);
  if(hyperdrive&&hyperdriveBurnRemaining>0){
    const tick=hyperdriveBurnRemaining/180;
    fuel=Math.max(0,fuel-tick);hyperdriveBurnRemaining=Math.max(0,hyperdriveBurnRemaining-tick);
  }
  if(fuel<=0&&!refueling&&dockPhase==='none') startDock('refuel');
  if(shields<=0&&!falconTriggered&&dockPhase==='none') startRescue();
  if(!docking){distTraveled+=warpSpeed*0.5;}
  bearing=(bearing+warpSpeed*0.08)%360;

  drawStars();
  if(!hyperdrive&&!docking&&frame-lastCometSpawn>200+Math.floor(Math.random()*120)){spawnComet();lastCometSpawn=frame;}
  if(!hyperdrive&&!docking) drawComets();
  drawFlyby();drawWeapons();drawEnemyWeapons();drawExplosions();drawFalcon();drawSpaceport();
  drawShip(); drawHUD();
  drawCombatTutorial();
  drawFriendlyFireTutorial();

  const inCombat=flybyObjects.some(obj=>obj&&obj.ship&&obj.ship.evil);
  const inRescue=falconTriggered||falconPhase!=='none';
  if(frame-lastContactFrame>nextContactIn&&!warpAnimating&&!docking&&!inCombat&&!inRescue){
    const ship=CONTACT_SHIPS[Math.floor(Math.random()*CONTACT_SHIPS.length)];
    spawnFlyby(ship,false);
    const savedWarp=warpFactor,savedTarget=targetWarp;
    if(warpFactor>3){
      warpFactor=Math.max(1,warpFactor-2);targetWarp=warpFactor/9;
      termPrint('CONTACT: '+ship.name+' \u2014 REDUCING WARP','bright');
      setTimeout(()=>{warpFactor=savedWarp;targetWarp=savedTarget;termPrint('CONTACT PASSED \u2014 RESUMING WARP','dim');},8000);
    }
    lastContactFrame=frame;
    nextContactIn=CONTACT_MIN+Math.floor(Math.random()*(CONTACT_MAX-CONTACT_MIN));
  }
  requestAnimationFrame(loop);
}
loop();
</script>
